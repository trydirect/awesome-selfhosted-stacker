name: zitadel
version: 4.16.0
app:
  type: custom
  image: ghcr.io/zitadel/zitadel:v4.16.0
  ports:
    - "8080:8080"
  command: start-from-init --masterkey "${ZITADEL_MASTERKEY}"
  environment:
    ZITADEL_PORT: 8080
    ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN}
    ZITADEL_EXTERNALPORT: 8080
    ZITADEL_EXTERNALSECURE: 'false'
    ZITADEL_TLS_ENABLED: 'false'
    ZITADEL_PUBLIC_SCHEME: http
    ZITADEL_DATABASE_POSTGRES_DSN: postgresql://postgres:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/zitadel?sslmode=disable
    ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: 'false'
    ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: 'true'
    ZITADEL_CACHES_CONNECTORS_REDIS_ENABLED: 'false'
  healthcheck:
    test: CMD /app/zitadel ready
    interval: 10s
    timeout: 30s
    retries: 12
    start_period: 20s
services:
  - name: postgres
    image: postgres:17.10-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: zitadel
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
    healthcheck:
      test: CMD-SHELL pg_isready -d zitadel -U postgres
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
  - name: redis
    image: redis:7.4.9-alpine
    command: --save "" --appendonly no
volumes:
  postgres-data: {}
proxy:
  type: none
  auto_detect: false
deploy:
  target: server
  server:
    host: 46.224.127.228
    user: root
    ssh_key: ${BASE_PATH}/stacker-project-test
    port: 22
hooks:
  pre_build: ./scripts/generate-secrets.sh
env_file: .env
