name: bitwarden
version: "2024.7.0"

project:
  identity: bitwarden

install:
  inputs:
    commonDomain: vault.example.com

app:
  type: custom
  image: vaultwarden/server:latest
  ports:
    - "80:80"
    - "3012:3012"
  environment:
    DOMAIN: "https://vault.example.com"
    SIGNUPS_ALLOWED: "false"
    INVITATIONS_ALLOWED: "true"
    SHOW_PASSWORD_HINT: "false"
    LOG_LEVEL: info
    LOG_FILE: /data/vw.log
    DATABASE_URL: "postgresql://bitwarden:${DB_PASSWORD}@bitwarden_db:5432/bitwarden"
    ADMIN_TOKEN: "${ADMIN_TOKEN}"
  volumes:
    - bitwarden_data:/data

services:
  - name: bitwarden_db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bitwarden
      POSTGRES_USER: bitwarden
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - bitwarden_db:/var/lib/postgresql/data
    healthcheck:
      test: "CMD-SHELL pg_isready -U bitwarden -d bitwarden"
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  bitwarden_db: {}
  bitwarden_data: {}

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "80"
      - "3012"

config_contract:
  app:
    environment:
      - name: DB_PASSWORD
        required: true
        secret: true
      - name: ADMIN_TOKEN
        required: true
        secret: true

hooks:
  pre_build: ./scripts/generate-secrets.sh

monitoring:
  status_panel: true

env_file: .env
