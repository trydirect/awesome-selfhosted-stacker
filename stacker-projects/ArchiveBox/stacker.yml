name: ArchiveBox
version: 1.0.0
app:
  type: python
  image: archivebox/archivebox:latest
  ports:
  - 8000:8000
  environment:
    BIND_ADDR: 0.0.0.0:8000
    BASE_URL: http://archivebox.localhost:8000
    ALLOWED_HOSTS: '*'
    PUBLIC_INDEX: 'True'
    PUBLIC_SNAPSHOTS: 'True'
    PUBLIC_ADD_VIEW: 'False'
    ADMIN_USERNAME: admin
    ADMIN_PASSWORD: ${ADMIN_PASSWORD}
services: []
proxy:
  type: none
  auto_detect: false
deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    ssh_key: ~/.ssh/id_ed25519
    public_ports:
    - '8000'
monitoring:
  status_panel: true
hooks:
  post_deploy: ./entrypoint.sh
env_file: .env
env: {}
