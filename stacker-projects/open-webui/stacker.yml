name: open-webui
version: "1.0.0"

app:
  type: python
  path: .
  dockerfile: Dockerfile
  ports:
    - "3000:8080"
  environment:
    OLLAMA_BASE_URL: "http://ollama:11434"
    WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY}"
    SCARF_NO_ANALYTICS: "true"
    DO_NOT_TRACK: "true"
    ANONYMIZED_TELEMETRY: "false"

services:
  - name: ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment: {}
    volumes:
      - ollama:/root/.ollama

proxy:
  type: none
  auto_detect: false

deploy:
  target: local

monitoring:
  status_panel: true

env_file: .env
env: {}

volumes:
  ollama: {}
