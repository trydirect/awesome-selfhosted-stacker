name: open-webui
version: "1.0.0"

project:
  identity: open-webui

install:
  inputs:
    commonDomain: ""

config_contract:
  app:
    environment:
      - name: OLLAMA_BASE_URL
        required: true
        secret: false
      - name: WEBUI_SECRET_KEY
        required: true
        secret: true
      - name: SCARF_NO_ANALYTICS
        required: false
        secret: false
      - name: DO_NOT_TRACK
        required: false
        secret: false
      - name: ANONYMIZED_TELEMETRY
        required: false
        secret: false

hooks:
  pre_build: ./scripts/generate-secrets.sh

app:
  type: python
  path: .
  dockerfile: Dockerfile
  ports:
    - "3000:8080"
  environment:
    OLLAMA_BASE_URL: "http://ollama:11434"
    WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY}"
    SCARF_NO_ANALYTICS: "true"
    DO_NOT_TRACK: "true"
    ANONYMIZED_TELEMETRY: "false"

services:
  - name: ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment: {}
    volumes:
      - ollama:/root/.ollama

proxy:
  type: none
  auto_detect: false

deploy:
  target: local

monitoring:
  status_panel: true

env_file: .env
env: {}

volumes:
  ollama: {}
