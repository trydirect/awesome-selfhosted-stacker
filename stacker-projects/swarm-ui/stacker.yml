name: swarm-ui
version: "1.0.0"

project:
  identity: swarm-ui

app:
  type: custom
  path: .
  dockerfile: Dockerfile
  ports:
    - "7801:7801"
  volumes:
    - swarm_data:/Data
    - swarm_backend:/dlbackend
    - ./Models:/Models
    - ./Output:/Output

volumes:
  swarm_data: {}
  swarm_backend: {}

proxy:
  type: none
  auto_detect: false

deploy:
  target: cloud
  cloud:
    provider: hetzner
    region: ${HETZNER_REGION}
    size: ${HETZNER_SERVER_TYPE}
    public_ports:
      - "7801"

monitoring:
  status_panel: true

env_file: .env
