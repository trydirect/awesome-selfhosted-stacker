name: speedtest-tracker

app:
  type: custom
  image: lscr.io/linuxserver/speedtest-tracker:latest
  ports:
    - "8080:80"
  environment:
    PUID: "1000"
    PGID: "1000"
    TZ: UTC
  volumes:
    - speedtest_config:/config

volumes:
  speedtest_config: {}

proxy:
  type: none
  auto_detect: false

env_file: .env
