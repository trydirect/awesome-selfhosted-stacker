_format_version: "3.0"
_transform: true

services:
  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-all
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-all
        paths:
          - /rest/v1/
    plugins:
      - name: cors

  - name: realtime-v1
    url: http://realtime:4000
    routes:
      - name: realtime-all
        paths:
          - /realtime/v1/
    plugins:
      - name: cors

  - name: storage-v1
    url: http://storage:5000
    routes:
      - name: storage-all
        paths:
          - /storage/v1/
    plugins:
      - name: cors

