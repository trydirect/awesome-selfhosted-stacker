name: wordpress
version: "6.5.0"

project:
  identity: wordpress

install:
  inputs:
    commonDomain: wordpress.example.com

app:
  type: php
  image: wordpress:latest
  ports:
    - "8080:80"
  environment:
    WORDPRESS_DB_HOST: wordpress_db:3306
    WORDPRESS_DB_NAME: wordpress
    WORDPRESS_DB_USER: wordpress
    WORDPRESS_DB_PASSWORD: "${DB_PASSWORD}"
    WORDPRESS_TABLE_PREFIX: "wp_"
    WORDPRESS_DEBUG: "false"
  volumes:
    - wordpress_data:/var/www/html

services:
  - name: wordpress_db
    image: mysql:8-alpine
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - wordpress_db:/var/lib/mysql
    healthcheck:
      test: "CMD mysqladmin ping -h localhost"
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  wordpress_db: {}
  wordpress_data: {}

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "8080"

config_contract:
  app:
    environment:
      - name: DB_PASSWORD
        required: true
        secret: true
      - name: DB_ROOT_PASSWORD
        required: true
        secret: true

hooks:
  pre_build: ./scripts/generate-secrets.sh

monitoring:
  status_panel: true

env_file: .env
