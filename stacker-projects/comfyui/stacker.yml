name: comfyui
version: "1.0.0"

app:
  type: custom
  path: .
  dockerfile: Dockerfile
  ports:
    - "8188:8188"
  environment:
    CLI_ARGS: ""
    PRELOAD_MODELS: "[]"

services: []

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cx52

monitoring:
  status_panel: true

env_file: .env
