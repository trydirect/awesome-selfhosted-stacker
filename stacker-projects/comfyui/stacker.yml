name: comfyui

project:
  identity: comfyui
version: "1.0.0"

app:
  type: custom
  path: .
  image: ashleykza/comfyui:latest
  ports:
    - "8188:8188"
  environment:
    CLI_ARGS: ""
    PRELOAD_MODELS: "[]"

services: []

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "8188"

monitoring:
  status_panel: true

env_file: .env
