name: nocodb

app:
  type: custom
  image: nocodb/nocodb:latest
  ports:
    - "8080:8080"
  environment:
    NC_DB: pg://nocodb-db:5432?u=nocodb&p=${DB_PASSWORD}&d=nocodb
  volumes:
    - nocodb_data:/usr/app/data

services:
  - name: nocodb-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nocodb
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - nocodb_db:/var/lib/postgresql/data
    healthcheck:
      test: CMD-SHELL pg_isready -d nocodb -U nocodb
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  nocodb_data: {}
  nocodb_db: {}

proxy:
  type: none
  auto_detect: false

hooks:
  pre_build: ./scripts/generate-secrets.sh

env_file: .env
