name: postiz-app
version: 1.0.0
project:
  identity: postiz-app
install:
  inputs:
    commonDomain: postiz.example.com
config_contract:
  app:
    environment:
    - name: MAIN_URL
      required: true
      secret: false
    - name: JWT_SECRET
      required: true
      secret: true
    - name: DB_PASSWORD
      required: true
      secret: true
    - name: TEMPORAL_DB_PASSWORD
      required: true
      secret: true
hooks:
  pre_build: ./scripts/generate-secrets.sh
app:
  type: custom
  image: ghcr.io/gitroomhq/postiz-app:latest
  ports:
  - 4007:5000
  volumes:
  - postiz_config:/config
  - postiz_uploads:/uploads
  environment:
    MAIN_URL: ${MAIN_URL}
    FRONTEND_URL: ${MAIN_URL}
    NEXT_PUBLIC_BACKEND_URL: ${MAIN_URL}/api
    JWT_SECRET: ${JWT_SECRET}
    DATABASE_URL: postgresql://postiz-user:${DB_PASSWORD}@postiz-postgres:5432/postiz-db-local
    REDIS_URL: redis://postiz-redis:6379
    BACKEND_INTERNAL_URL: http://localhost:3000
    TEMPORAL_ADDRESS: temporal:7233
    IS_GENERAL: 'true'
    DISABLE_REGISTRATION: 'false'
    STORAGE_PROVIDER: local
    UPLOAD_DIRECTORY: /uploads
    NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads
    MASTODON_URL: https://mastodon.social
    API_LIMIT: '30'
    NX_ADD_PLUGINS: 'false'
services:
- name: postiz-postgres
  image: postgres:17-alpine
  environment:
    POSTGRES_DB: postiz-db-local
    POSTGRES_USER: postiz-user
    POSTGRES_PASSWORD: ${DB_PASSWORD}
  volumes:
  - postiz_postgres_data:/var/lib/postgresql/data
  healthcheck:
    test: CMD-SHELL pg_isready -U postiz-user -d postiz-db-local
    interval: 10s
    timeout: 5s
    retries: 10
- name: postiz-redis
  image: redis:7.2
  volumes:
  - postiz_redis_data:/data
  healthcheck:
    test: CMD redis-cli ping
    interval: 10s
    timeout: 5s
    retries: 10
- name: temporal-elasticsearch
  image: elasticsearch:7.17.27
  environment:
    cluster.routing.allocation.disk.threshold_enabled: 'true'
    cluster.routing.allocation.disk.watermark.low: 512mb
    cluster.routing.allocation.disk.watermark.high: 256mb
    cluster.routing.allocation.disk.watermark.flood_stage: 128mb
    discovery.type: single-node
    ES_JAVA_OPTS: -Xms256m -Xmx256m
    xpack.security.enabled: 'false'
  volumes:
  - temporal_elasticsearch_data:/usr/share/elasticsearch/data
- name: temporal-postgresql
  image: postgres:16
  environment:
    POSTGRES_DB: temporal
    POSTGRES_USER: temporal
    POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD}
  volumes:
  - temporal_postgres_data:/var/lib/postgresql/data
  healthcheck:
    test: CMD-SHELL pg_isready -U temporal -d temporal
    interval: 10s
    timeout: 5s
    retries: 10
- name: temporal
  image: temporalio/auto-setup:1.28.1
  ports:
  - 127.0.0.1:7233:7233
  volumes:
  - ./dynamicconfig/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
  environment:
    DB: postgres12
    DB_PORT: '5432'
    POSTGRES_USER: temporal
    POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD}
    POSTGRES_SEEDS: temporal-postgresql
    DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ENABLE_ES: 'true'
    ES_SEEDS: temporal-elasticsearch
    ES_VERSION: v7
    TEMPORAL_NAMESPACE: default
proxy:
  type: none
  auto_detect: false
deploy:
  target: server
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
    - '4007'
  server:
    host: 46.224.127.228
    user: root
    ssh_key: ${BASE_PATH}/stacker-project-test
    port: 22
monitoring:
  status_panel: true
env_file: .env
volumes:
  postiz_config: {}
  postiz_uploads: {}
  postiz_postgres_data: {}
  postiz_redis_data: {}
  temporal_elasticsearch_data: {}
  temporal_postgres_data: {}
