name: ghost-umami

app:
  type: custom
  image: ghost:5-alpine
  ports:
    - "2368:2368"
  environment:
    url: http://${GHOST_HOST}:2368
    database__client: mysql
    database__connection__host: ghost-mysql
    database__connection__user: ghost
    database__connection__password: ${DB_PASSWORD}
    database__connection__database: ghost
    NODE_ENV: production
  volumes:
    - ghost_content:/var/lib/ghost/content

services:
  - name: ghost-mysql
    image: mysql:8
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_USER: ghost
      MYSQL_DATABASE: ghost
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ghost_mysql_data:/var/lib/mysql
    healthcheck:
      test: CMD mysqladmin ping -h localhost
      interval: 10s
      timeout: 5s
      retries: 10

  - name: umami
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:${DB_PASSWORD}@umami-db:5432/umami
      HASH_SALT: ${HASH_SALT}
    depends_on:
      - umami-db

  - name: umami-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: CMD-SHELL pg_isready -d umami -U umami
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ghost_content: {}
  ghost_mysql_data: {}
  umami_db_data: {}

proxy:
  type: none
  auto_detect: false

hooks:
  pre_build: ./scripts/generate-secrets.sh

env_file: .env
