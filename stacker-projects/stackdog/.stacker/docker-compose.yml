services:
  app:
    build:
      context: ..
      dockerfile: .stacker/Dockerfile
    ports:
    - 80:80
    restart: unless-stopped
    networks:
    - app-network
    labels:
      my.stacker.dns: app
      my.stacker.scope: project
      my.stacker.service: app
  stackdog:
    image: trydirect/stackdog:latest
    ports:
    - 5000:5000
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: '5000'
      DATABASE_URL: /data/stackdog.db
      STACKDOG_AI_API_KEY: '***REDACTED***'
      STACKDOG_AI_API_URL: https://api.openai.com/v1
      STACKDOG_AI_MODEL: gpt-4o-mini
      STACKDOG_AI_PROVIDER: openai
      STACKDOG_LOG_SOURCES: /var/log/syslog,/var/log/auth.log
      STACKDOG_SLACK_WEBHOOK_URL: yourslackchannelwebhook
      STACKDOG_SNIFF_INTERVAL: '600'
    volumes:
    - stackdog-data:/data
    - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
    - app-network
    labels:
      my.stacker.dns: stackdog
      my.stacker.scope: project
      my.stacker.service: stackdog
networks:
  app-network:
    driver: bridge
volumes:
  stackdog-data: null
