name: vaultwarden
version: "1.0.0"

project:
  identity: vaultwarden

install:
  inputs:
    commonDomain: ""

config_contract:
  app:
    environment:
      - name: DOMAIN
        required: true
        secret: false
      - name: SIGNUPS_ALLOWED
        required: false
        secret: false
      - name: ADMIN_TOKEN
        required: true
        secret: true

hooks:
  pre_build: ./scripts/generate-secrets.sh

app:
  type: custom
  path: .
  image: vaultwarden/server:latest
  ports:
    - "8080:80"
  environment:
    DOMAIN: "http://localhost:8080"
    SIGNUPS_ALLOWED: "true"
    ADMIN_TOKEN: "${ADMIN_TOKEN}"
  volumes:
    - vaultwarden_data:/data

services: []

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "8080"

monitoring:
  status_panel: true

env_file: .env
