services:
  app:
    build:
      context: ..
      dockerfile: .stacker/Dockerfile
    ports:
    - 8080:80
    environment:
      DOMAIN: http://localhost:8080
      SIGNUPS_ALLOWED: 'true'
    volumes:
    - vaultwarden_data:/data
    restart: unless-stopped
    networks:
    - app-network
    labels:
      my.stacker.dns: app
      my.stacker.scope: project
      my.stacker.service: app
networks:
  app-network:
    driver: bridge
volumes:
  vaultwarden_data: null
