name: discourse
version: 3.2.0
project:
  identity: discourse
install:
  inputs:
    commonDomain: forum.example.com
app:
  type: custom
  image: discourse/discourse:latest
  ports:
  - 80:80
  - 443:443
  environment:
    DISCOURSE_HOSTNAME: forum.example.com
    DISCOURSE_DEVELOPER_EMAILS: admin@example.com
    DISCOURSE_SMTP_ADDRESS: smtp.example.com
    DISCOURSE_SMTP_PORT: '587'
    DISCOURSE_SMTP_USER_NAME: ${SMTP_USER}
    DISCOURSE_SMTP_PASSWORD: ${SMTP_PASSWORD}
    DISCOURSE_SMTP_ENABLE_START_TLS: 'true'
    DISCOURSE_DB_HOST: discourse_db
    DISCOURSE_DB_PORT: '5432'
    DISCOURSE_DB_NAME: discourse
    DISCOURSE_DB_USERNAME: discourse
    DISCOURSE_DB_PASSWORD: ${DB_PASSWORD}
    DISCOURSE_REDIS_HOST: redis
    REDIS_HOST: redis
services:
- name: discourse_db
  image: pgvector/pgvector:0.8.0-pg16
  environment:
    POSTGRES_DB: discourse
    POSTGRES_USER: discourse
    POSTGRES_PASSWORD: ${DB_PASSWORD}
  ports:
  - 127.0.0.1:5432:5432
  volumes:
  - discourse_db:/var/lib/postgresql/data
  healthcheck:
    test: CMD-SHELL pg_isready -U discourse -d discourse
    interval: 10s
    timeout: 5s
    retries: 10
- name: redis
  image: redis:7-alpine
  ports:
  - 127.0.0.1:6379:6379
  volumes:
  - discourse_redis:/data
  healthcheck:
    test: CMD redis-cli ping
    interval: 10s
    timeout: 5s
    retries: 10
volumes:
  discourse_db: {}
  discourse_redis: {}
proxy:
  type: none
  auto_detect: false
deploy:
  target: server
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
    - '80'
    - '443'
  server:
    host: 46.224.127.228
    user: root
    ssh_key: /Users/vasilipascal/work/stacker-project-examples/stacker-project-test
    port: 22
config_contract:
  app:
    environment:
    - name: DB_PASSWORD
      required: true
      secret: true
    - name: SMTP_USER
      required: true
      secret: false
    - name: SMTP_PASSWORD
      required: true
      secret: true
hooks:
  pre_build: ./scripts/generate-secrets.sh
monitoring:
  status_panel: true
env_file: .env
