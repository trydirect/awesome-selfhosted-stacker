name: umami
version: 1.0.0
organization: null
project:
  identity: umami
app:
  type: node
  path: .
  dockerfile: null
  image: ghcr.io/umami-software/umami:postgresql-latest
  build: null
  ports:
  - 3000:3000
  volumes: []
  environment:
    DATABASE_URL: postgresql://umami:${DB_PASSWORD}@postgres:5432/umami
    PORT: '3000'
    APP_SECRET: ${APP_SECRET}
    NODE_ENV: production
    NEXT_TELEMETRY_DISABLED: '1'
    HOSTNAME: 0.0.0.0
  command: null
  healthcheck: null
services:
- name: postgres
  image: postgres:15-alpine
  ports:
  - 127.0.0.1:5432:5432
  environment:
    POSTGRES_PASSWORD: ${DB_PASSWORD}
    POSTGRES_DB: umami
    POSTGRES_USER: umami
  volumes:
  - postgres_data:/var/lib/postgresql/data
  depends_on: []
  command: null
  healthcheck:
    test: CMD-SHELL pg_isready -U umami -d umami
    interval: 5s
    timeout: 5s
    retries: 5
proxy:
  type: none
  auto_detect: false
  domains: []
  config: null
deploy:
  target: server
  environment: null
  compose_file: null
  deployment_hash: null
  cloud:
    provider: hetzner
    orchestrator: remote
    region: fsn1
    size: cpx22
    install_image: null
    remote_payload_file: null
    ssh_key: null
    key: null
    server: null
    public_ports:
    - '3000'
  server:
    host: 46.224.127.228
    user: root
    ssh_key: ${BASE_PATH}/stacker-project-test
    port: 22
  registry: null
  default_target: null
  targets: {}
install:
  inputs:
    commonDomain: example.com
environments: {}
ai:
  enabled: false
  provider: openai
  model: null
  api_key: null
  endpoint: null
  timeout: 0
  tasks: []
monitoring:
  status_panel: true
  healthcheck: null
  metrics: null
hooks:
  pre_build: ./scripts/generate-secrets.sh
  post_deploy: null
  on_failure: null
env_file: .env
env: {}
config_contract:
  services:
    app: {}
