services:
  app:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      FLOCI_BASE_URL: "http://floci:4566"
      FLOCI_HOSTNAME: "floci"
      FLOCI_SERVICES_DOCKER_NETWORK: "floci_default"
      FLOCI_SERVICES_LAMBDA_HOT_RELOAD_ENABLED: "true"
      FLOCI_SERVICES_RDS_PROXY_BASE_PORT: "7001"
      FLOCI_TLS_ENABLED: "true"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./data:/app/data"
    healthcheck:
      test: "CMD curl -f http://localhost:4566/_floci/health || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - app-network
    labels:
      my.stacker.dns: "app"
      my.stacker.scope: "project"
      my.stacker.service: "app"

networks:
  app-network:
    driver: bridge

