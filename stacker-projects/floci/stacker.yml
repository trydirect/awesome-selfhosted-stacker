# Stacker configuration — generated by `stacker init --from-github --with-ai floci-io/floci`
# Docs: https://docs.try.direct/stacker

name: floci
proxy:
  type: none
  auto_detect: false
deploy:
  target: local
monitoring:
  status_panel: true
  healthcheck:
    endpoint: http://localhost:4566/_floci/health
    interval: 30s
app:
  type: custom
  path: .
  healthcheck:
    test: CMD curl -f http://localhost:4566/_floci/health || exit 1
    interval: 10s
    timeout: 5s
    retries: 10
  image: floci/floci:latest
  environment:
    FLOCI_SERVICES_RDS_PROXY_BASE_PORT: '7001'
    FLOCI_SERVICES_LAMBDA_HOT_RELOAD_ENABLED: 'true'
    FLOCI_BASE_URL: http://floci:4566
    FLOCI_TLS_ENABLED: 'true'
    FLOCI_HOSTNAME: floci
    FLOCI_SERVICES_DOCKER_NETWORK: floci_default
  ports:
  - 4566:4566
  volumes:
  - /var/run/docker.sock:/var/run/docker.sock
  - ./data:/app/data
