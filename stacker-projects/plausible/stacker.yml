name: plausible
version: "1.1.0"

project:
  identity: plausible

app:
  type: custom
  image: ghcr.io/plausible/community-edition:v3.2.1
  command: >-
    sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
  environment:
    BASE_URL: "${BASE_URL}"
    SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
    DATABASE_URL: "postgres://postgres:${DB_PASSWORD}@plausible_db:5432/plausible"
    CLICKHOUSE_DATABASE_URL: "http://plausible_events_db:8123/plausible"
    DISABLE_REGISTRATION: "${DISABLE_REGISTRATION}"
    TOTP_VAULT_KEY: "${TOTP_VAULT_KEY}"

services:
  - name: plausible_db
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: plausible
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: "CMD-SHELL pg_isready -U postgres -d plausible"
      interval: 10s
      timeout: 5s
      retries: 10

  - name: plausible_events_db
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - event_data:/var/lib/clickhouse
      - event_logs:/var/log/clickhouse-server
    healthcheck:
      test: "CMD-SHELL wget -qO- http://127.0.0.1:8123/ping || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data: {}
  event_data: {}
  event_logs: {}
  plausible_data: {}

proxy:
  type: none
  auto_detect: false

install:
  inputs:
    commonDomain: plausible.example.com

deploy:
  target: cloud
  compose_file: docker/production/compose.yml
  cloud:
    provider: hetzner
    region: ${HETZNER_REGION}
    size: ${HETZNER_SERVER_TYPE}
    public_ports:
      - "8000/tcp"

config_contract:
  services:
    plausible_db:
      required: [POSTGRES_DB]
      secret: [POSTGRES_PASSWORD]
    plausible:
      required: [BASE_URL, DATABASE_URL, CLICKHOUSE_DATABASE_URL]
      secret: [SECRET_KEY_BASE, TOTP_VAULT_KEY]

hooks:
  pre_build: ./scripts/generate-secrets.sh

monitoring:
  status_panel: true

env_file: .env
