name: plausible
version: "1.1.0"

project:
  identity: plausible

app:
  type: custom
  image: ghcr.io/plausible/community-edition:v3.2.1
  command: >-
    sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
  environment:
    BASE_URL: "${BASE_URL}"
    SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
    DATABASE_URL: "postgres://postgres:${DB_PASSWORD}@plausible_db:5432/plausible"
    CLICKHOUSE_DATABASE_URL: "http://plausible_events_db:8123/plausible"
    DISABLE_REGISTRATION: "${DISABLE_REGISTRATION}"
    TOTP_VAULT_KEY: "${TOTP_VAULT_KEY}"

services:
  - name: plausible_db
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: plausible
    volumes:
      - db_data:/var/lib/postgresql/data

  - name: plausible_events_db
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - event_data:/var/lib/clickhouse
      - event_logs:/var/log/clickhouse-server

volumes:
  db_data: {}
  event_data: {}
  event_logs: {}
  plausible_data: {}

proxy:
  type: none
  auto_detect: false

deploy:
  target: cloud
  compose_file: docker/production/compose.yml
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "8000/tcp"

monitoring:
  status_panel: true

hooks:
  post_deploy: ./post-deploy.sh

env_file: .env
