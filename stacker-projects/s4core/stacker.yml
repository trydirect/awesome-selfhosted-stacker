name: s4core
version: 1.0.0
organization: null
project:
  identity: s4core
app:
  type: custom
  path: .
  dockerfile: null
  image: s4core/s4core:latest
  build: null
  ports:
  - 9000:9000
  volumes:
  - s4_data:/data
  environment:
    S4_DATA_DIR: /data
    S4_ACCESS_KEY_ID: ${S4_ACCESS_KEY_ID}
    S4_BIND: 0.0.0.0:9000
    RUST_LOG: ${RUST_LOG}
    S4_MAX_UPLOAD_SIZE: ${S4_MAX_UPLOAD_SIZE}
    S4_ROOT_USERNAME: root
    S4_SECRET_ACCESS_KEY: ${S4_SECRET_ACCESS_KEY}
    S4_ROOT_PASSWORD: ${S4_ROOT_PASSWORD}
  command: null
  healthcheck:
    test: CMD-SHELL wget --spider -q http://localhost:9000/health || exit 1
    interval: 30s
    timeout: 10s
    retries: 5
services:
- name: s4console
  image: s4core/s4console:latest
  ports:
  - 3000:3000
  environment:
    NODE_ENV: production
    S4_BACKEND_URL: http://app:9000
  volumes: []
  depends_on: []
  command: null
  healthcheck: null
proxy:
  type: none
  auto_detect: false
  domains: []
  config: null
deploy:
  target: server
  environment: null
  compose_file: null
  deployment_hash: null
  cloud:
    provider: hetzner
    orchestrator: remote
    region: ${HETZNER_REGION}
    size: ${HETZNER_SERVER_TYPE}
    install_image: null
    remote_payload_file: null
    ssh_key: null
    key: null
    server: null
    public_ports:
    - '9000'
    - '3000'
  server:
    host: 46.224.127.228
    user: root
    ssh_key: /Users/vasilipascal/work/stacker-project-examples/stacker-project-test
    port: 22
  registry: null
  default_target: null
  targets: {}
install:
  inputs:
    commonDomain: storage.example.com
environments: {}
ai:
  enabled: false
  provider: openai
  model: null
  api_key: null
  endpoint: null
  timeout: 0
  tasks: []
monitoring:
  status_panel: true
  healthcheck:
    endpoint: /health
    interval: 30s
  metrics: null
hooks:
  pre_build: ./scripts/generate-secrets.sh
  post_deploy: null
  on_failure: null
env_file: .env
env: {}
config_contract:
  services: {}
