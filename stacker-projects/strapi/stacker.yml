name: strapi
version: "4.25.0"

project:
  identity: strapi

install:
  inputs:
    commonDomain: strapi.example.com

app:
  type: node
  path: .
  image: strapi:latest
  ports:
    - "1337:1337"
  environment:
    NODE_ENV: production
    DATABASE_CLIENT: postgres
    DATABASE_HOST: strapi_db
    DATABASE_PORT: "5432"
    DATABASE_NAME: strapi
    DATABASE_USERNAME: strapi
    DATABASE_PASSWORD: "${DB_PASSWORD}"
    JWT_SECRET: "${JWT_SECRET}"
    ADMIN_JWT_SECRET: "${ADMIN_JWT_SECRET}"
  volumes:
    - strapi_data:/strapi/src/api

services:
  - name: strapi_db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - strapi_db:/var/lib/postgresql/data
    healthcheck:
      test: "CMD-SHELL pg_isready -U strapi -d strapi"
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  strapi_db: {}
  strapi_data: {}

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "1337"

config_contract:
  app:
    environment:
      - name: DB_PASSWORD
        required: true
        secret: true
      - name: JWT_SECRET
        required: true
        secret: true
      - name: ADMIN_JWT_SECRET
        required: true
        secret: true

hooks:
  pre_build: ./scripts/generate-secrets.sh

monitoring:
  status_panel: true

env_file: .env
