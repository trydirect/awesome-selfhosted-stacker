name: strapi
version: 4.25.0
organization: null
project:
  identity: strapi
app:
  type: node
  path: .
  dockerfile: null
  image: strapi:latest
  build: null
  ports:
  - 1337:1337
  volumes:
  - strapi_data:/strapi/src/api
  environment:
    DATABASE_PASSWORD: ${DB_PASSWORD}
    DATABASE_CLIENT: postgres
    DATABASE_HOST: strapi_db
    DATABASE_NAME: strapi
    JWT_SECRET: ${JWT_SECRET}
    ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
    DATABASE_PORT: '5432'
    DATABASE_USERNAME: strapi
    NODE_ENV: production
  command: null
  healthcheck: null
services:
- name: strapi_db
  image: postgres:16-alpine
  ports:
  - 127.0.0.1:5432:5432
  environment:
    POSTGRES_USER: strapi
    POSTGRES_DB: strapi
    POSTGRES_PASSWORD: ${DB_PASSWORD}
  volumes:
  - strapi_db:/var/lib/postgresql/data
  depends_on: []
  command: null
  healthcheck:
    test: CMD-SHELL pg_isready -U strapi -d strapi
    interval: 10s
    timeout: 5s
    retries: 10
proxy:
  type: none
  auto_detect: false
  domains: []
  config: null
