name: "mail-archiver"
version: "1.0.0"
project:
  identity: "mail-archiver"
install:
  inputs:
    commonDomain: "mailarchiver.example.com"
config_contract:
  app:
    environment:
      - name: "ADMIN_USERNAME"
        required: false
        secret: false
      - name: "TIMEZONE"
        required: false
        secret: false
      - name: "DB_PASSWORD"
        required: true
        secret: true
      - name: "ADMIN_PASSWORD"
        required: true
        secret: true
hooks:
  pre_build: "./scripts/generate-secrets.sh"
app:
  type: "custom"
  image: "s1t5/mailarchiver:latest"
  ports:
    - "5000:5000"
  volumes:
    - "mailarchiver_keys:/app/DataProtection-Keys"
  environment:
    ConnectionStrings__DefaultConnection: "Host=postgres;Database=MailArchiver;Username=mailuser;Password=${DB_PASSWORD}"
    Authentication__Username: "${ADMIN_USERNAME}"
    Authentication__Password: "${ADMIN_PASSWORD}"
    TimeZone__DisplayTimeZoneId: "${TIMEZONE}"
services:
  - name: "postgres"
    image: "postgres:17-alpine"
    environment:
      POSTGRES_DB: "MailArchiver"
      POSTGRES_USER: "mailuser"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "mailarchiver_postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: "CMD-SHELL pg_isready -U mailuser -d MailArchiver"
      interval: "10s"
      timeout: "5s"
      retries: 10
proxy:
  type: "none"
  auto_detect: false
deploy:
  target: "local"
  cloud:
    provider: "hetzner"
    region: "fsn1"
    size: "cpx22"
    public_ports:
      - "5000"
monitoring:
  status_panel: true
env_file: ".env"
volumes:
  mailarchiver_keys: {}
  mailarchiver_postgres_data: {}
