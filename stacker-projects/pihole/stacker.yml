name: pihole
version: "1.0.0"

project:
  identity: pihole

install:
  inputs:
    commonDomain: ""

config_contract:
  app:
    environment:
      - name: TZ
        required: false
        secret: false
      - name: WEBPASSWORD
        required: true
        secret: true
      - name: PIHOLE_DNS_
        required: false
        secret: false
      - name: DNSSEC
        required: false
        secret: false
      - name: CONDITIONAL_FORWARDING
        required: false
        secret: false

hooks:
  pre_build: ./scripts/generate-secrets.sh

app:
  type: custom
  path: .
  image: pihole/pihole:latest
  ports:
    - "8080:80"
    - "8053:53/udp"
    - "8053:53/tcp"
  environment:
    TZ: "${TZ}"
    WEBPASSWORD: "${WEBPASSWORD}"
    PIHOLE_DNS_: "${PIHOLE_DNS_}"
    DNSSEC: "true"
    CONDITIONAL_FORWARDING: "false"

services: []

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "8080"
      - "8053/tcp"
      - "8053/udp"

monitoring:
  status_panel: true

env_file: .env
