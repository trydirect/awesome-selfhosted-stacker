services:
  app:
    build:
      context: ..
      dockerfile: .stacker/Dockerfile
    ports:
    - 8080:80
    - 53:53
    environment:
      CONDITIONAL_FORWARDING: 'false'
      DNSSEC: 'true'
      PIHOLE_DNS_: 1.1.1.1;1.0.0.1
      TZ: UTC
      WEBPASSWORD: admin
    restart: unless-stopped
    networks:
    - app-network
    labels:
      my.stacker.dns: app
      my.stacker.scope: project
      my.stacker.service: app
networks:
  app-network:
    driver: bridge
