name: duplicati

app:
  type: custom
  image: lscr.io/linuxserver/duplicati:latest
  ports:
    - "8200:8200"
  environment:
    PUID: "1000"
    PGID: "1000"
    TZ: UTC
  volumes:
    - duplicati_config:/config
    - duplicati_backups:/backups
    - duplicati_source:/source

volumes:
  duplicati_config: {}
  duplicati_backups: {}
  duplicati_source: {}

proxy:
  type: none
  auto_detect: false

env_file: .env
