services:
  coolify:
    image: '${REGISTRY_URL:-ghcr.io}/coollabsio/coolify:${LATEST_IMAGE:-latest}'
    container_name: coolify
    restart: always
    working_dir: /var/www/html
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - coolify
    volumes:
      - type: bind
        source: ${COOLIFY_SOURCE_ENV_FILE:-./coolify.env}
        target: /var/www/html/.env
        read_only: true
      - coolify-ssh:/var/www/html/storage/app/ssh
      - coolify-applications:/var/www/html/storage/app/applications
      - coolify-databases:/var/www/html/storage/app/databases
      - coolify-services:/var/www/html/storage/app/services
      - coolify-backups:/var/www/html/storage/app/backups
    environment:
      APP_ENV: ${APP_ENV:-production}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-256M}
      PHP_FPM_PM_CONTROL: ${PHP_FPM_PM_CONTROL:-dynamic}
      PHP_FPM_PM_START_SERVERS: ${PHP_FPM_PM_START_SERVERS:-1}
      PHP_FPM_PM_MIN_SPARE_SERVERS: ${PHP_FPM_PM_MIN_SPARE_SERVERS:-1}
      PHP_FPM_PM_MAX_SPARE_SERVERS: ${PHP_FPM_PM_MAX_SPARE_SERVERS:-10}
    env_file:
      - .env
    ports:
      - '${APP_PORT:-8000}:8080'
    expose:
      - '8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      soketi:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail http://127.0.0.1:8080/api/health || exit 1
      interval: 5s
      retries: 10
      timeout: 2s

  postgres:
    image: postgres:15-alpine
    container_name: coolify-db
    restart: always
    networks:
      - coolify
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-coolify}
    volumes:
      - coolify-db:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE:-coolify}
      interval: 5s
      retries: 10
      timeout: 2s

  redis:
    image: redis:7-alpine
    container_name: coolify-redis
    restart: always
    networks:
      - coolify
    command: >
      redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - coolify-redis:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a ${REDIS_PASSWORD} ping | grep PONG
      interval: 5s
      retries: 10
      timeout: 2s

  soketi:
    image: '${REGISTRY_URL:-ghcr.io}/coollabsio/coolify-realtime:1.0.13'
    container_name: coolify-realtime
    restart: always
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - coolify
    ports:
      - '${SOKETI_PORT:-6001}:6001'
      - '6002:6002'
    volumes:
      - coolify-ssh:/var/www/html/storage/app/ssh
    environment:
      APP_NAME: ${APP_NAME:-Coolify}
      SOKETI_DEBUG: ${SOKETI_DEBUG:-false}
      SOKETI_DEFAULT_APP_ID: ${PUSHER_APP_ID}
      SOKETI_DEFAULT_APP_KEY: ${PUSHER_APP_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET}
      SOKETI_HOST: ${SOKETI_HOST:-0.0.0.0}
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:6001/ready && wget -qO- http://127.0.0.1:6002/ready || exit 1
      interval: 5s
      retries: 10
      timeout: 2s

volumes:
  coolify-applications:
  coolify-backups:
  coolify-databases:
  coolify-db:
  coolify-redis:
  coolify-services:
  coolify-ssh:

networks:
  coolify:
    name: coolify
    driver: bridge
    external: false
