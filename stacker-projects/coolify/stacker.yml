name: coolify
version: '1.2'

project:
  identity: coolify

app:
  type: custom
  image: 'coollabsio/coolify:latest'
  ports:
    - "8000:8080"
  environment:
    APP_ENV: production
    APP_NAME: Coolify
    APP_KEY: "${APP_KEY}"
    APP_URL: "http://localhost:8000"
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_DATABASE: coolify
    DB_USERNAME: coolify
    DB_PASSWORD: "${DB_PASSWORD}"
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    REDIS_PASSWORD: "${REDIS_PASSWORD}"
    PUSHER_APP_ID: coolify
    PUSHER_APP_KEY: coolify
    PUSHER_APP_SECRET: "${PUSHER_APP_SECRET}"
    SOKETI_HOST: soketi
    SOKETI_PORT: "6001"
    SOKETI_DEBUG: "false"
  volumes:
    - coolify-ssh:/var/www/html/storage/app/ssh
    - coolify-applications:/var/www/html/storage/app/applications
    - coolify-databases:/var/www/html/storage/app/databases
    - coolify-services:/var/www/html/storage/app/services
    - coolify-backups:/var/www/html/storage/app/backups

services:
  - name: postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: coolify
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: coolify
    volumes:
      - coolify-db:/var/lib/postgresql/data
    healthcheck:
      test: "CMD-SHELL pg_isready -U coolify -d coolify"
      interval: 5s
      timeout: 2s
      retries: 10

  - name: redis
    image: redis:7-alpine
    command: redis-server --save 20 1 --loglevel warning --requirepass "${REDIS_PASSWORD}"
    volumes:
      - coolify-redis:/data
    healthcheck:
      test: "CMD-SHELL redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"
      interval: 5s
      timeout: 2s
      retries: 10

  - name: soketi
    image: 'ghcr.io/coollabsio/coolify-realtime:1.0.13'
    ports:
      - "6001:6001"
      - "6002:6002"
    environment:
      APP_NAME: Coolify
      SOKETI_DEBUG: "false"
      SOKETI_DEFAULT_APP_ID: coolify
      SOKETI_DEFAULT_APP_KEY: coolify
      SOKETI_DEFAULT_APP_SECRET: "${PUSHER_APP_SECRET}"
      SOKETI_HOST: 0.0.0.0

volumes:
  coolify-db: {}
  coolify-redis: {}
  coolify-ssh: {}
  coolify-applications: {}
  coolify-databases: {}
  coolify-services: {}
  coolify-backups: {}

proxy:
  type: nginx-proxy-manager
  auto_detect: true

deploy:
  target: cloud
  cloud:
    provider: hetzner
    region: ${HETZNER_REGION}
    size: ${HETZNER_SERVER_TYPE}
    ssh_key: ${STACKER_SSH_KEY}
    public_ports:
      - "8000"
      - "80"
      - "81"
      - "6001"
      - "6002"
      - "8053/tcp"
      - "8053/udp"
      - "5000"

ai:
  enabled: true
  provider: ollama
  model: qwen2.5-coder
  endpoint: http://192.168.100.245:11434
  timeout: 0
  tasks:
    - compose
    - troubleshoot
    - security

monitoring:
  status_panel: true
  healthcheck:
    endpoint: /api/health
    interval: 15s

env_file: .env
