name: posthog
version: 1.53.0
organization: null
project:
  identity: posthog
app:
  type: python
  path: .
  dockerfile: null
  image: posthog/posthog:latest
  build: null
  ports:
  - 8000:8000
  volumes: []
  environment:
    POSTGRES_DB: posthog
    POSTGRES_PASSWORD: ${DB_PASSWORD}
    DEPLOYMENT: docker
    POSTGRES_HOST: posthog_db
    SECURE_COOKIES: 'false'
    REDIS_URL: redis://redis:6379
    POSTHOG_DOMAIN: analytics.example.com
    SECRET_KEY: ${SECRET_KEY}
    POSTGRES_USER: posthog
  command: null
  healthcheck: null
services:
- name: posthog_db
  image: postgres:16-alpine
  ports:
  - 127.0.0.1:5432:5432
  environment:
    POSTGRES_USER: posthog
    POSTGRES_INITDB_ARGS: -c shared_buffers=256MB
    POSTGRES_PASSWORD: ${DB_PASSWORD}
    POSTGRES_DB: posthog
  volumes:
  - posthog_db:/var/lib/postgresql/data
  depends_on: []
  command: null
  healthcheck:
    test: CMD-SHELL pg_isready -U posthog -d posthog
    interval: 10s
    timeout: 5s
    retries: 10
- name: redis
  image: redis:7-alpine
  ports:
  - 127.0.0.1:6379:6379
  environment: {}
  volumes:
  - posthog_redis:/data
  depends_on: []
  command: null
  healthcheck:
    test: CMD redis-cli ping
    interval: 10s
    timeout: 5s
    retries: 10
proxy:
  type: none
  auto_detect: false
  domains: []
  config: null
deploy:
  target: server
  environment: null
  compose_file: null
  deployment_hash: null
  cloud:
    provider: hetzner
    orchestrator: remote
    region: fsn1
    size: cpx22
    install_image: null
    remote_payload_file: null
    ssh_key: null
    key: null
    server: null
    public_ports:
    - '8000'
  server:
    host: 46.224.127.228
    user: root
    ssh_key: ${BASE_PATH}/stacker-project-test
    port: 22
  registry: null
  default_target: null
  targets: {}
install:
  inputs:
    commonDomain: analytics.example.com
environments: {}
ai:
  enabled: false
  provider: openai
  model: null
  api_key: null
  endpoint: null
  timeout: 0
  tasks: []
monitoring:
  status_panel: true
  healthcheck: null
  metrics: null
hooks:
  pre_build: ./scripts/generate-secrets.sh
  post_deploy: null
  on_failure: null
env_file: .env
env: {}
config_contract:
  services: {}
