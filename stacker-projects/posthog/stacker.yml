name: posthog
version: "1.53.0"

project:
  identity: posthog

install:
  inputs:
    commonDomain: analytics.example.com

app:
  type: python
  image: posthog/posthog:latest
  ports:
    - "8000:8000"
  environment:
    POSTGRES_HOST: posthog_db
    POSTGRES_DB: posthog
    POSTGRES_USER: posthog
    POSTGRES_PASSWORD: "${DB_PASSWORD}"
    REDIS_URL: "redis://redis:6379"
    SECRET_KEY: "${SECRET_KEY}"
    POSTHOG_DOMAIN: analytics.example.com
    DEPLOYMENT: docker
    SECURE_COOKIES: "false"

services:
  - name: posthog_db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: posthog
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - posthog_db:/var/lib/postgresql/data
    healthcheck:
      test: "CMD-SHELL pg_isready -U posthog -d posthog"
      interval: 10s
      timeout: 5s
      retries: 10

  - name: redis
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - posthog_redis:/data
    healthcheck:
      test: "CMD redis-cli ping"
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  posthog_db: {}
  posthog_redis: {}

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "8000"

config_contract:
  app:
    environment:
      - name: DB_PASSWORD
        required: true
        secret: true
      - name: SECRET_KEY
        required: true
        secret: true

hooks:
  pre_build: ./scripts/generate-secrets.sh

monitoring:
  status_panel: true

env_file: .env
