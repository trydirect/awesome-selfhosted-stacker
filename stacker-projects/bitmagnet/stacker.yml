name: "bitmagnet"
version: "1.0.0"
project:
  identity: "bitmagnet"
install:
  inputs:
    commonDomain: "bitmagnet.example.com"
config_contract:
  app:
    environment:
      - name: "DB_PASSWORD"
        required: true
        secret: true
hooks:
  pre_build: "./scripts/generate-secrets.sh"
app:
  type: "custom"
  image: "ghcr.io/bitmagnet-io/bitmagnet:latest"
  ports:
    - "3333:3333"
  command: "worker run --all"
  volumes:
    - "bitmagnet_config:/root/.config/bitmagnet"
    - "bitmagnet_data:/root/.local/share/bitmagnet"
  environment:
    LOG_FILE_ROTATOR_ENABLED: "false"
    POSTGRES_HOST: "postgres"
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "${DB_PASSWORD}"
    POSTGRES_DB: "bitmagnet"
    TMDB_API_KEY: ""
services:
  - name: "postgres"
    image: "postgres:16-alpine"
    environment:
      POSTGRES_DB: "bitmagnet"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "bitmagnet_postgres_data:/var/lib/postgresql/data"
    shm_size: "1g"
    healthcheck:
      test: "CMD-SHELL pg_isready -U postgres -d bitmagnet"
      interval: "10s"
      timeout: "5s"
      retries: 10
proxy:
  type: "none"
  auto_detect: false
deploy:
  target: "local"
  cloud:
    provider: "hetzner"
    region: "fsn1"
    size: "cpx22"
    public_ports:
      - "3333"
monitoring:
  status_panel: true
env_file: ".env"
volumes:
  bitmagnet_config: {}
  bitmagnet_data: {}
  bitmagnet_postgres_data: {}
