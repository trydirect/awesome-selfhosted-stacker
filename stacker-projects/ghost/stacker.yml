name: ghost
version: "1.0.0"

project:
  identity: ghost

install:
  inputs:
    commonDomain: ""

config_contract:
  app:
    environment:
      - name: GHOST_URL
        required: true
        secret: false
      - name: DB_PASSWORD
        required: true
        secret: true
      - name: database__client
        required: false
        secret: false
      - name: database__connection__host
        required: false
        secret: false
      - name: database__connection__user
        required: false
        secret: false
      - name: database__connection__password
        required: true
        secret: true
      - name: database__connection__database
        required: false
        secret: false
      - name: NODE_ENV
        required: false
        secret: false
  services:
    mysql:
      environment:
        - name: MYSQL_ROOT_PASSWORD
          required: true
          secret: true
        - name: MYSQL_DATABASE
          required: false
          secret: false
        - name: MYSQL_USER
          required: false
          secret: false
        - name: MYSQL_PASSWORD
          required: true
          secret: true

hooks:
  pre_build: ./scripts/generate-secrets.sh

app:
  type: custom
  path: .
  image: ghost:5-alpine
  ports:
    - "2368:2368"
  volumes:
    - ghost_content:/var/lib/ghost/content
  environment:
    url: "${GHOST_URL}"
    database__client: mysql
    database__connection__host: mysql
    database__connection__user: ghost
    database__connection__password: "${DB_PASSWORD}"
    database__connection__database: ghost
    NODE_ENV: production

services:
  - name: mysql
    image: mysql:8
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "2368"

monitoring:
  status_panel: true

env_file: .env
