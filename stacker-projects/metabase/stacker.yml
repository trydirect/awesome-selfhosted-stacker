name: metabase
version: 0.49.0
organization: null
project:
  identity: metabase
app:
  type: custom
  path: .
  dockerfile: null
  image: metabase/metabase:latest
  build: null
  ports:
  - 3000:3000
  volumes: []
  environment:
    MB_DB_PASS: ${DB_PASSWORD}
    MB_DB_DBNAME: metabase
    MB_DB_PORT: '5432'
    MB_DB_TYPE: postgres
    MB_DB_USER: metabase
    MB_JAVA_TIMEZONE: UTC
    MB_DB_HOST: metabase_db
  command: null
  healthcheck: null
services:
- name: metabase_db
  image: postgres:16-alpine
  ports:
  - 127.0.0.1:5432:5432
  environment:
    POSTGRES_PASSWORD: ${DB_PASSWORD}
    POSTGRES_DB: metabase
    POSTGRES_USER: metabase
  volumes:
  - metabase_db:/var/lib/postgresql/data
  depends_on: []
  command: null
  healthcheck:
    test: CMD-SHELL pg_isready -U metabase -d metabase
    interval: 10s
    timeout: 5s
    retries: 10
