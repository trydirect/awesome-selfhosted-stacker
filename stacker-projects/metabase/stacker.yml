name: metabase
version: "0.49.0"

project:
  identity: metabase

install:
  inputs:
    commonDomain: analytics.example.com

app:
  type: custom
  image: metabase/metabase:latest
  ports:
    - "3000:3000"
  environment:
    MB_DB_TYPE: postgres
    MB_DB_DBNAME: metabase
    MB_DB_PORT: "5432"
    MB_DB_USER: metabase
    MB_DB_PASS: "${DB_PASSWORD}"
    MB_DB_HOST: metabase_db
    MB_JAVA_TIMEZONE: UTC

services:
  - name: metabase_db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - metabase_db:/var/lib/postgresql/data
    healthcheck:
      test: "CMD-SHELL pg_isready -U metabase -d metabase"
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  metabase_db: {}

proxy:
  type: none
  auto_detect: false

deploy:
  target: local
  cloud:
    provider: hetzner
    region: fsn1
    size: cpx22
    public_ports:
      - "3000"

config_contract:
  app:
    environment:
      - name: DB_PASSWORD
        required: true
        secret: true

hooks:
  pre_build: ./scripts/generate-secrets.sh

monitoring:
  status_panel: true

env_file: .env
