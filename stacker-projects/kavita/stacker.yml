name: kavita

app:
  type: custom
  image: lscr.io/linuxserver/kavita:latest
  ports:
    - "5000:5000"
  environment:
    PUID: "1000"
    PGID: "1000"
    TZ: UTC
  volumes:
    - kavita_config:/config
    - kavita_library:/library

volumes:
  kavita_config: {}
  kavita_library: {}

proxy:
  type: none
  auto_detect: false

env_file: .env
