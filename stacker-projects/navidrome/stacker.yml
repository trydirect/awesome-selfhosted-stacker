name: navidrome

app:
  type: custom
  image: deluan/navidrome:latest
  ports:
    - "4533:4533"
  environment:
    ND_SCANSCHEDULE: 1h
    ND_LOGLEVEL: info
    ND_BASEURL: ""
  volumes:
    - navidrome_data:/data
    - navidrome_music:/music:ro

volumes:
  navidrome_data: {}
  navidrome_music: {}

proxy:
  type: none
  auto_detect: false

monitoring:
  status_panel: true

env_file: .env
